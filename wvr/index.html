<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RF</title>
    <!-- Link the CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Link the Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;A700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>বিয়ের ভিডিও</h1>
        
        <div class="unc-grid">
            
            <!-- Unc 1 Card - Structure Changed -->
            <div class="unc-card">
                <!-- This link now ONLY wraps the thumbnail -->
                <a href="em.html" class="card-thumbnail-link">
                    <div class="card-thumbnail">
                        <img src="https://i.ibb.co.com/Ndn2dJKQ/em.webp" alt="Unc 1 Thumbnail">
                    </div>
                </a>
                <div class="card-footer">
                    <div class="card-title">এনামুল মামা</div>
                    <button class="download-btn" data-unc="em" data-title="এনামুল মামা">Download</button>
                </div>
            </div>
            
            <!-- Unc 2 Card - Structure Changed -->
            <div class="unc-card">
                <a href="mm.html" class="card-thumbnail-link">
                    <div class="card-thumbnail">
                        <img src="https://i.ibb.co.com/hx3LVSsS/mm.webp" alt="Unc 2 Thumbnail">
                    </div>
                </a>
                <div class="card-footer">
                    <div class="card-title">মনির মামা</div>
                    <button class="download-btn" data-unc="mm" data-title="মনির মামা">Download</button>
                </div>
            </div>
            
            <!-- Unc 3 Card - Structure Changed -->
            <div class="unc-card">
                <a href="sm.html" class="card-thumbnail-link">
                    <div class="card-thumbnail">
                        <img src="https://i.ibb.co.com/s9dFGnZC/sm.webp" alt="Unc 3 Thumbnail">
                    </div>
                </a>
                <div class="card-footer">
                    <div class="card-title">সাবিরিন মামা</div>
                    <button class="download-btn" data-unc="sm" data-title="সাবিরিন মামা">Download</button>
                </div>
            </div>

        </div>
    </div>

    <!-- NEW: Download Modal Structure -->
    <div class="download-modal-backdrop" id="modalBackdrop"></div>
    <div class="download-modal-content" id="downloadModal">
        <div class="modal-header">
            <h3 id="modalTitle">Download Videos</h3>
            <button class="modal-close-btn" id="modalCloseBtn">&times;</button>
        </div>
        <div class="modal-list" id="modalList">
            <!-- Download links will be injected here by JS -->
            <p>Loading...</p>
        </div>
    </div>

    <!-- NEW: Download Modal Script -->
    <script src="download-modal.js" defer></script>

</body>
</html>
